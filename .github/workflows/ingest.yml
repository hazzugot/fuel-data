name: ingest-fuel-prices
on:
  schedule:
    - cron: "0 6 * * *"      # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run ingester
        run: node scripts/ingest.mjs
      - name: Commit
        run: |
          git config user.name  "fuel-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: $(date -u +%F)"
            git push
          fi
